model:
  sana_path: "<SANA_PATH>"
  lora_rank: 64
  lora_alpha: 64
  lora_target_modules:
    - "to_q"
    - "to_k"
    - "to_v"
    - "to_out.0"
  lora_dropout: 0.0

training:
  batch_size: 4
  learning_rate_g: 5.0e-5
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_steps: 100000
  lambda_l2: 1.0
  lambda_lpips: 2.0
  lambda_vsd: 1.0
  lambda_vsd_lora: 1.0
  img_loss_batch_size: 4
  # Main SANA-SR one-step generation setting.
  gen_timestep: 900
  num_train_timesteps: 1000
  # OSEDiff distribution matching samples broad timesteps in [20, 980).
  noise_t_min: 70
  noise_t_max: 650
  max_grad_norm: 1.0
  ema_decay: 0.999

prompting:
  # SeeSR/OSEDiff-style targeted prompt extraction.
  prompt_source: "hq"
  ram_path: "<RAM_PATH>"
  ram_ft_path: "<DAPE_PATH>"
  prompt_suffix: "clean, extremely detailed, best quality, sharp, high-resolution"

data:
  hq_dir: "<TRAIN_HQ_DIR>"
  lq_dir: ""
  use_osediff_degradation: true
  realsr_train_hq_dir: "<REALSR_TRAIN_HQ_DIR>"
  realsr_use_osediff_degradation: true
  image_size: 512
  scale_factor: 4
  num_workers: 12

logging:
  output_dir: "./outputs/sanasr_hqprompt"
  log_interval: 50
  save_interval: 5000
  use_tensorboard: true

